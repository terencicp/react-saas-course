# gitleaks configuration for react-saas-course
# Extends the bundled default ruleset; adds allowlists for known false positives.
[extend]
useDefault = true

[[allowlists]]
description = "Documentation prose, not a secret. The default generic-api-key rule matches the words 'credentials env, S3-compatible SDK' in chapter/project outlines."
regexes = [
  '''S3-compatible''',
]

[[allowlists]]
description = "Canonical UUID example values in lesson code fixtures (e.g. a `token` field validated by z.uuid()). UUIDs are public identifiers, not secrets, but the default generic-api-key rule flags high-entropy values next to keys like 'token'."
regexes = [
  '''[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}''',
]
